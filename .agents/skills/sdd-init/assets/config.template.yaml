# openspec/config.yaml — Generado por sdd-init
schema: spec-driven

context: |
  ## Proyecto
  {nombre y descripción breve}
  ## Stack
  {stack detectado}
  ## Arquitectura
  {patrones detectados}
  ## Convenciones
  - Código en inglés, specs y documentación en español

# Política de AGENTS.md: managed | section | readonly
agents_md_policy: section

# Modo de agente: multi | sequential
agent_mode: sequential

# Asignación de modelos (solo aplica si agent_mode: multi)
# Los nombres son aliases — mapear al modelo real disponible
model_assignments:
  orchestrator: opus      # Coordina y toma decisiones
  sdd-explore: sonnet     # Lectura estructural
  sdd-propose: opus       # Decisiones de alcance
  sdd-spec: sonnet        # Redacción estructurada
  sdd-design: opus        # Decisiones arquitectónicas
  sdd-tasks: sonnet       # Descomposición mecánica
  sdd-apply: sonnet       # Implementación
  sdd-verify: sonnet      # Verificación
  sdd-archive: haiku      # Copiar y cerrar
  default: sonnet         # Delegación general

# Modo de interacción default: interactive | auto
interaction_mode: interactive

# Namespaces (metadata de specs, no carpetas)
namespaces: []
# Ejemplo:
# - id: inventory
#   label: Inventario
#   description: Productos, variantes, stock

# TDD
tdd: false
# test_command: ""

# Overrides por fase
rules:
  spec:
    - Incluir sección de Casos de Borde (obligatoria)
  archive:
    - Retro obligatoria antes de mover a archive
